name: IdentityGuard AI CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Install system dependencies
        sudo apt-get update && sudo apt-get install -y libgl1-mesa-glx libglib2.0-0 build-essential
    - name: Run Pytest
      run: |
        cd backend
        pytest tests/

  test-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
    - name: Install dependencies
      run: |
        cd frontend
        npm ci
    - name: Install Playwright Browsers
      run: |
        cd frontend
        npx playwright install --with-deps
    - name: Run Playwright tests
      run: |
        cd frontend
        # Assuming Playwright handles standing up the server via its own config, or we just test static compilation
        npx playwright test

  build-docker:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
    - uses: actions/checkout@v3
    - name: Build Docker Compose
      run: docker compose build
