version: "3.8"

services:
  db:
      image: postgres:15-alpine
      container_name: identityguard_postgres
      restart: always
      environment:
        POSTGRES_USER: ${POSTGRES_USER:-postgres}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
        POSTGRES_DB: ${POSTGRES_DB:-identityguard}
      ports:
        - "5432:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres"]
        interval: 10s
        timeout: 5s
        retries: 5

  redis:
      image: redis:7-alpine
      container_name: identityguard_redis
      restart: always
      ports:
        - "6379:6379"
      volumes:
        - redis_data:/data
        
  backend:
      build: 
        context: ./backend
        dockerfile: Dockerfile
      container_name: identityguard_backend
      restart: always
      depends_on:
        db:
          condition: service_healthy
        redis:
          condition: service_started
      environment:
        - DATABASE_URL=postgresql://postgres:postgres@db:5432/identityguard
        - REDIS_URL=redis://redis:6379/0
        - USE_SQLITE=false
      ports:
        - "8000:8000"
      volumes:
        - ./backend:/app
        - backend_data:/app/data

  worker:
      build: 
        context: ./backend
        dockerfile: Dockerfile
      container_name: identityguard_celery
      command: celery -A app.workers.celery_worker.celery_app worker --loglevel=info
      restart: always
      depends_on:
        - redis
        - db
      environment:
        - DATABASE_URL=postgresql://postgres:postgres@db:5432/identityguard
        - REDIS_URL=redis://redis:6379/0
        - USE_SQLITE=false
      volumes:
        - ./backend:/app
        - backend_data:/app/data

  mcp_server:
      build: 
        context: ./backend
        dockerfile: Dockerfile
      container_name: identityguard_mcp
      command: python -m app.mcp.mcp_server --sse
      restart: always
      depends_on:
        - db
      environment:
        - DATABASE_URL=postgresql://postgres:postgres@db:5432/identityguard
      ports:
        - "9000:9000"
      volumes:
        - ./backend:/app
        - backend_data:/app/data

  frontend:
      build:
        context: ./frontend
        dockerfile: Dockerfile
      container_name: identityguard_frontend
      restart: always
      depends_on:
        - backend
      ports:
        - "5173:5173"

  nginx:
      image: nginx:alpine
      container_name: identityguard_nginx
      ports:
        - "80:80"
      volumes:
        - ./nginx.conf:/etc/nginx/nginx.conf:ro
      depends_on:
        - frontend
        - backend
        - mcp_server

volumes:
  postgres_data:
  redis_data:
  backend_data:
