services:
  - type: web
    name: identityguard-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: FACE_MATCHING_MODE
        value: arcface_cosine_similarity
      - key: FACE_MODEL_NAME
        value: ArcFace
      - key: FACE_DETECTOR_BACKEND
        value: retinaface
      - key: FACE_MATCH_THRESHOLD
        value: "0.72"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
